<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DX登録｜志木のDX電話帳</title>
  <style>
    :root{--navy:#092b63;--blue:#1677d2;--line:#d9e6f2;--text:#17324d;--muted:#65798c;--green:#159b78;--danger:#c34b4b}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#f5fbff,#fff 45%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP","Yu Gothic",sans-serif}
    .wrap{width:min(920px,calc(100% - 28px));margin:0 auto}
    header{background:var(--navy);color:#fff;padding:28px 0 26px;box-shadow:0 5px 18px #092b6330}
    header h1{margin:0;font-size:clamp(23px,5vw,34px);letter-spacing:.04em}
    header p{margin:8px 0 0;color:#dceeff;font-size:14px}
    main{padding:24px 0 54px}
    .notice{padding:13px 15px;border-radius:14px;background:#e8f5ff;border:1px solid #cbe6fb;color:#2d5876;font-size:13px;line-height:1.8;margin-bottom:18px}
    form{display:grid;gap:16px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:19px;box-shadow:0 9px 26px #164d7710}
    .panel h2{margin:0 0 15px;color:var(--navy);font-size:18px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px 15px}
    .full{grid-column:1/-1}
    label{display:grid;gap:6px;font-weight:700;font-size:13px;color:#35536d}
    input,select,textarea{width:100%;border:1px solid #c8d9e7;border-radius:10px;background:#fbfdff;color:var(--text);font:inherit;padding:11px 12px;outline:none}
    textarea{min-height:105px;resize:vertical;line-height:1.7}
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px #1677d220}
    small{font-weight:400;color:var(--muted);line-height:1.5}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{border:0;border-radius:10px;padding:12px 18px;font:700 14px inherit;cursor:pointer}
    .primary{background:var(--blue);color:#fff}
    .secondary{background:#eaf3fb;color:var(--navy)}
    .danger{background:#fff0f0;color:var(--danger)}
    button:disabled{opacity:.6;cursor:wait}
    #status{min-height:22px;font-size:14px;font-weight:700;color:var(--green)}
    #status.error{color:var(--danger)}
    .preview{display:none;margin-top:15px;border:1px dashed #bdd3e5;border-radius:13px;padding:14px;background:#f8fcff}
    .preview.show{display:block}
    .preview strong{display:block;margin-bottom:7px;color:var(--navy)}
    .preview-card{display:flex;gap:13px;align-items:center}
    .preview-card img{width:76px;height:76px;object-fit:cover;border-radius:12px;background:#eaf7ff}
    .preview-card b{font-size:17px}
    .preview-card p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .back{display:inline-block;margin-top:18px;color:var(--blue);font-size:14px}
    @media(max-width:650px){
      .grid{grid-template-columns:1fr}
      .full{grid-column:auto}
      .panel{padding:15px}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>志木のDX電話帳</h1>
      <p>DX登録画面｜スプレッドシートの「DX一覧」へ保存します</p>
    </div>
  </header>

  <main class="wrap">
    <div class="notice">
      ここで入力したDXは、保存後にトップページの電話帳へ反映されます。
      公開URLは、登録するDXのページURLを入れてください。
    </div>

    <form id="dx-form">
      <section class="panel">
        <h2>基本情報</h2>

        <div class="grid">
          <label>
            DX_ID
            <small>既存データを直すときだけ入力。新規なら空欄で自動作成。</small>
            <input id="id" type="text" placeholder="例：shiki-lunch-001">
          </label>

          <label>
            DX名 *
            <input id="name" type="text" required placeholder="例：志木のお店情報DX">
          </label>

          <label>
            分類 *
            <select id="category" required>
              <option value="">選択してください</option>
              <option>お店・飲食</option>
              <option>暮らし</option>
              <option>防災</option>
              <option>福祉</option>
              <option>子育て</option>
              <option>地域活動</option>
              <option>イベント</option>
              <option>観光</option>
              <option>まちづくり</option>
              <option>その他</option>
            </select>
          </label>

          <label>
            地域
            <input id="area" type="text" value="志木市" placeholder="例：志木市・周辺地域">
          </label>

          <label>
            公開状態
            <select id="status-select">
              <option>公開中</option>
              <option>制作中</option>
              <option>非公開</option>
            </select>
          </label>

          <label>
            表示順
            <small>数字が小さいほど上に表示されます。</small>
            <input id="order" type="number" min="1" value="1">
          </label>

          <label class="full">
            短い説明 *
            <textarea id="description" required placeholder="このDXで何ができるかを短く書きます。"></textarea>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>リンク・画像</h2>

        <div class="grid">
          <label class="full">
            公開URL *
            <input id="url" type="url" required placeholder="https://ichirohns-jpg.github.io/xxxxx/">
          </label>

          <label>
            アイコンURL
            <small>空欄なら電話帳の共通画像を使います。</small>
            <input id="iconUrl" type="text" placeholder="shiki-dx-phonebook-icon.jpg">
          </label>

          <label>
            バナーURL
            <small>必要なときだけ入力します。</small>
            <input id="bannerUrl" type="text" placeholder="shiki-dx-phonebook-banner.jpg">
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>確認・保存</h2>

        <div class="actions">
          <button class="primary" id="save-button" type="submit">DXを保存する</button>
          <button class="secondary" id="preview-button" type="button">入力内容を確認</button>
          <button class="danger" id="clear-button" type="button">入力をクリア</button>
        </div>

        <p id="status" role="status"></p>
        <div class="preview" id="preview"></div>
      </section>
    </form>

    <a class="back" href="./index.html">← 志木のDX電話帳トップへ戻る</a>
  </main>

  <iframe name="dx-post-frame" id="dx-post-frame" title="保存結果" style="display:none"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzwK-O5QGVloX0h4dqV6bmMCsDeXT116Je8PS4ZVIMRLI2XSE6bc0Fm_5XWFrJZwdXl/exec";
    const ADMIN_KEY = "shiki-dx-admin-2026";
    const DRAFT_KEY = "shikiDxDxDraft";

    const form = document.getElementById("dx-form");
    const status = document.getElementById("status");
    const saveButton = document.getElementById("save-button");

    function value(id){
      return document.getElementById(id).value.trim();
    }

    function readForm(){
      return {
        id:value("id"),
        name:value("name"),
        category:value("category"),
        area:value("area") || "志木市",
        description:value("description"),
        url:value("url"),
        iconUrl:value("iconUrl"),
        bannerUrl:value("bannerUrl"),
        status:document.getElementById("status-select").value,
        order:value("order") || "1"
      };
    }

    function fillForm(data){
      [
        "id",
        "name",
        "category",
        "area",
        "description",
        "url",
        "iconUrl",
        "bannerUrl",
        "order"
      ].forEach(key=>{
        if(data[key] !== undefined){
          document.getElementById(key).value = data[key];
        }
      });

      if(data.status){
        document.getElementById("status-select").value = data.status;
      }
    }

    function setStatus(message,isError){
      status.textContent = message;
      status.className = isError ? "error" : "";
    }

    function showPreview(){
      const data = readForm();
      const preview = document.getElementById("preview");
      const image = data.iconUrl || "shiki-dx-phonebook-icon.jpg";

      preview.innerHTML =
        "<strong>この内容で登録します</strong>" +
        "<div class=\"preview-card\">" +
        "<img src=\"" + safe(image) + "\" alt=\"\">" +
        "<div><b>" + safe(data.name || "DX名未入力") + "</b>" +
        "<p>" + safe(data.category || "分類未選択") +
        "｜" + safe(data.area) + "<br>" +
        safe(data.description || "説明未入力") +
        "</p></div></div>";

      preview.classList.add("show");
    }

    function safe(text){
      return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function saveDraft(){
      localStorage.setItem(DRAFT_KEY,JSON.stringify(readForm()));
    }

    function clearForm(){
      form.reset();
      document.getElementById("area").value = "志木市";
      document.getElementById("order").value = "1";
      document.getElementById("preview").classList.remove("show");
      localStorage.removeItem(DRAFT_KEY);
      setStatus("入力をクリアしました。",false);
    }

    function submitToGas(data){
      const postForm = document.createElement("form");

      postForm.method = "POST";
      postForm.action = GAS_URL;
      postForm.target = "dx-post-frame";
      postForm.style.display = "none";

      const payload = {
        action:"saveDx",
        key:ADMIN_KEY,
        ...data
      };

      const input = document.createElement("input");
      input.name = "payload";
      input.value = JSON.stringify(payload);

      postForm.appendChild(input);
      document.body.appendChild(postForm);
      postForm.submit();

      setTimeout(()=>{
        postForm.remove();
      },3000);
    }

    form.addEventListener("input",saveDraft);

    document.getElementById("preview-button")
      .addEventListener("click",showPreview);

    document.getElementById("clear-button")
      .addEventListener("click",clearForm);

    form.addEventListener("submit",event=>{
      event.preventDefault();

      const data = readForm();

      if(!data.name || !data.category || !data.description || !data.url){
        setStatus("DX名・分類・短い説明・公開URLを入力してください。",true);
        return;
      }

      saveButton.disabled = true;
      setStatus("保存しています…",false);
      submitToGas(data);

      setTimeout(()=>{
        saveButton.disabled = false;
        setStatus(
          "保存しました。トップページへの反映まで少し時間がかかる場合があります。",
          false
        );
        localStorage.removeItem(DRAFT_KEY);
      },1200);
    });

    try{
      const draft = JSON.parse(
        localStorage.getItem(DRAFT_KEY) || "null"
      );

      if(draft){
        fillForm(draft);
      }
    }catch(error){}
  </script>
</body>
</html>
