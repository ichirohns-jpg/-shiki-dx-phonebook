<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b3d91">
  <title>管理画面｜志木のDX電話帳</title>
  <style>
    :root{
      --navy:#0b3d91;
      --navy-dark:#082c6a;
      --blue:#2f8fe8;
      --sky:#eaf7ff;
      --mint:#e9fbf4;
      --green:#36a66b;
      --orange:#f39a34;
      --ink:#17324d;
      --muted:#6e8193;
      --line:#dce9f3;
      --white:#ffffff;
      --shadow:0 12px 28px rgba(20,75,120,.10);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--ink);
      background:linear-gradient(180deg,#f8fcff 0%,#eef9ff 55%,#fff 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
      line-height:1.6;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}

    .topbar{
      position:sticky;
      top:0;
      z-index:5;
      background:rgba(255,255,255,.95);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(12px);
    }

    .topbar-inner{
      width:min(1180px,calc(100% - 28px));
      min-height:68px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .brand img{
      width:42px;
      height:42px;
      border-radius:13px;
      object-fit:cover;
      box-shadow:0 5px 14px rgba(11,61,145,.18);
    }

    .brand strong{
      display:block;
      color:var(--navy);
      font-size:17px;
      line-height:1.2;
      white-space:nowrap;
    }

    .brand span{
      display:block;
      color:var(--muted);
      font-size:11px;
      white-space:nowrap;
    }

    .top-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      background:#fff;
      color:var(--navy);
      border-radius:999px;
      padding:8px 13px;
      font-size:12px;
      font-weight:800;
    }

    .page{
      width:min(1180px,calc(100% - 28px));
      margin:auto;
      padding:26px 0 60px;
    }

    .page-heading{
      margin-bottom:20px;
    }

    .page-heading h1{
      margin:0;
      color:var(--navy);
      font-size:clamp(24px,5vw,36px);
      line-height:1.25;
    }

    .page-heading p{
      margin:7px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(300px,.86fr);
      gap:20px;
      align-items:start;
    }

    .panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:20px;
    }

    .panel h2{
      margin:0 0 16px;
      color:var(--navy-dark);
      font-size:21px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      color:var(--navy-dark);
      font-size:13px;
      font-weight:800;
    }

    label small{
      color:var(--muted);
      font-weight:500;
    }

    input,select,textarea{
      width:100%;
      border:1px solid #cfe0ec;
      border-radius:12px;
      padding:11px 12px;
      color:var(--ink);
      background:#fbfdff;
      outline:none;
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(47,143,232,.12);
    }

    textarea{
      min-height:130px;
      resize:vertical;
    }

    .image-row{
      display:grid;
      grid-template-columns:1fr 92px;
      gap:8px;
      align-items:center;
    }

    .image-preview{
      width:92px;
      height:58px;
      border-radius:10px;
      object-fit:cover;
      background:var(--sky);
      border:1px solid var(--line);
      display:block;
    }

    .hint{
      margin:0;
      color:var(--muted);
      font-size:11px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:9px;
      margin-top:18px;
    }

    .button{
      border:0;
      border-radius:999px;
      padding:11px 15px;
      font-weight:800;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    .button-primary{
      background:var(--navy);
      color:#fff;
    }

    .button-green{
      background:var(--green);
      color:#fff;
    }

    .button-secondary{
      background:#eef6fc;
      color:var(--navy);
      border:1px solid var(--line);
    }

    .button-danger{
      background:#fff0f0;
      color:#b33f4b;
      border:1px solid #f1cfd2;
    }

    .button:active{
      transform:translateY(1px);
    }

    .preview-panel{
      position:sticky;
      top:88px;
    }

    .preview-note{
      margin:-8px 0 14px;
      color:var(--muted);
      font-size:12px;
    }

    .share-image-wrap{
      overflow:hidden;
      border-radius:16px;
      background:var(--sky);
      border:1px solid var(--line);
    }

    .share-stage{
      position:relative;
      aspect-ratio:16 / 9;
      overflow:hidden;
    }

    .share-stage img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .share-overlay{
      position:absolute;
      left:5%;
      top:10%;
      width:48%;
      color:var(--navy-dark);
      text-shadow:0 1px 0 rgba(255,255,255,.8);
    }

    .share-type{
      font-size:clamp(10px,1.6vw,14px);
      font-weight:900;
      color:var(--green);
      margin-bottom:4px;
    }

    .share-title{
      font-size:clamp(16px,3vw,30px);
      font-weight:900;
      line-height:1.3;
      overflow-wrap:anywhere;
    }

    .share-date{
      margin-top:8px;
      font-size:clamp(10px,1.5vw,14px);
      font-weight:800;
      color:#42617c;
    }

    .article-preview{
      margin-top:16px;
      padding:16px;
      border-radius:16px;
      background:#f8fcff;
      border:1px solid var(--line);
    }

    .article-preview .meta{
      color:var(--green);
      font-size:12px;
      font-weight:800;
    }

    .article-preview h3{
      margin:5px 0 7px;
      color:var(--navy-dark);
      font-size:20px;
      line-height:1.35;
    }

    .article-preview p{
      margin:0;
      color:#536a7e;
      font-size:13px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
    }

    .preview-links{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:13px;
    }

    .preview-links a{
      padding:7px 10px;
      border-radius:999px;
      background:#eaf7ff;
      color:var(--navy);
      font-size:11px;
      font-weight:800;
    }

    .saved-box{
      margin-top:20px;
      padding:14px;
      border-radius:16px;
      background:var(--mint);
      border:1px solid #cdeedf;
    }

    .saved-box h3{
      margin:0 0 5px;
      color:#23754b;
      font-size:15px;
    }

    .saved-box p{
      margin:0;
      color:#47745d;
      font-size:12px;
    }

    .saved-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }

    .saved-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:9px 10px;
      background:#fff;
      border-radius:11px;
      border:1px solid #d8eee2;
    }

    .saved-item strong{
      font-size:12px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .saved-item button{
      border:0;
      background:transparent;
      color:#b33f4b;
      font-size:12px;
      font-weight:800;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translate(-50%,20px);
      opacity:0;
      pointer-events:none;
      background:#17324d;
      color:#fff;
      border-radius:999px;
      padding:10px 16px;
      font-size:12px;
      font-weight:700;
      transition:.2s;
      z-index:20;
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%,0);
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:11px;
      padding:10px 20px 30px;
    }

    @media(max-width:850px){
      .layout{
        grid-template-columns:1fr;
      }

      .preview-panel{
        position:static;
      }
    }

    @media(max-width:560px){
      .form-grid{
        grid-template-columns:1fr;
      }

      .field.full{
        grid-column:auto;
      }

      .panel{
        padding:16px;
        border-radius:18px;
      }

      .topbar-inner{
        min-height:62px;
      }

      .brand strong{
        font-size:15px;
      }

      .brand span{
        font-size:10px;
      }

      .top-link{
        padding:7px 10px;
      }

      .actions .button{
        flex:1 1 auto;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">
        <img src="shiki-dx-phonebook-icon.jpg" alt="志木のDX電話帳">
        <span>
          <strong>志木のDX電話帳</strong>
          <span>管理画面</span>
        </span>
      </a>

      <a class="top-link" href="index.html">
        公開ページを見る
      </a>
    </div>
  </header>

  <main class="page">
    <div class="page-heading">
      <h1>特別なお知らせを登録</h1>
      <p>入力したテーマ・日付・種別は、右側のシェア画像へ自動で入ります。</p>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>記事情報</h2>

        <form id="article-form">
          <div class="form-grid">

            <div class="field">
              <label for="isPublic">公開状態</label>
              <select id="isPublic">
                <option value="公開">公開</option>
                <option value="非公開">非公開</option>
              </select>
            </div>

            <div class="field">
              <label for="type">種別</label>
              <select id="type">
                <option>お知らせ</option>
                <option>新着DX</option>
                <option>募集</option>
                <option>イベント</option>
                <option>特集</option>
                <option>重要</option>
              </select>
            </div>

            <div class="field">
              <label for="date">日付</label>
              <input id="date" type="date">
            </div>

            <div class="field">
              <label for="order">表示順</label>
              <input id="order" type="number" min="0" value="1">
            </div>

            <div class="field full">
              <label for="title">
                テーマ
                <small>記事タイトル・シェア画像に表示</small>
              </label>
              <input id="title" type="text" placeholder="例：志木のDX電話帳を始めます">
            </div>

            <div class="field full">
              <label for="body">詳細内容</label>
              <textarea id="body" placeholder="記事の本文・説明・案内を入力してください"></textarea>
            </div>

            <div class="field full">
              <label>
                画像URL
                <small>最大5枚・空欄は無視</small>
              </label>

              <div class="image-row">
                <input class="image-url" type="url" placeholder="画像1のURL">
                <img class="image-preview" alt="画像1プレビュー">
              </div>

              <div class="image-row">
                <input class="image-url" type="url" placeholder="画像2のURL">
                <img class="image-preview" alt="画像2プレビュー">
              </div>

              <div class="image-row">
                <input class="image-url" type="url" placeholder="画像3のURL">
                <img class="image-preview" alt="画像3プレビュー">
              </div>

              <div class="image-row">
                <input class="image-url" type="url" placeholder="画像4のURL">
                <img class="image-preview" alt="画像4プレビュー">
              </div>

              <div class="image-row">
                <input class="image-url" type="url" placeholder="画像5のURL">
                <img class="image-preview" alt="画像5プレビュー">
              </div>
            </div>

            <div class="field">
              <label for="applyName">申し込みボタン名</label>
              <input id="applyName" type="text" placeholder="例：申し込む">
            </div>

            <div class="field">
              <label for="applyUrl">申し込みURL</label>
              <input id="applyUrl" type="url" placeholder="https://">
            </div>

            <div class="field">
              <label for="detailName">詳細ボタン名</label>
              <input id="detailName" type="text" placeholder="例：詳しく見る">
            </div>

            <div class="field">
              <label for="detailUrl">詳細リンクURL</label>
              <input id="detailUrl" type="url" placeholder="https://">
            </div>

            <div class="field full">
              <label for="youtubeUrl">YouTube URL</label>
              <input id="youtubeUrl" type="url" placeholder="https://www.youtube.com/watch?v=">
            </div>

            <div class="field">
              <label for="relatedDxId">
                関連DX_ID
                <small>任意</small>
              </label>
              <input id="relatedDxId" type="text" placeholder="例：shiki-go-map">
            </div>

            <div class="field">
              <label for="startDate">
                掲載開始日
                <small>任意</small>
              </label>
              <input id="startDate" type="date">
            </div>

            <div class="field">
              <label for="endDate">
                掲載終了日
                <small>任意</small>
              </label>
              <input id="endDate" type="date">
            </div>
          </div>

          <div class="actions">
            <button class="button button-primary" type="button" id="save-button">
              保存してシートへ送信
            </button>

            <button class="button button-green" type="button" id="download-button">
              シェア画像を保存
            </button>

            <button class="button button-secondary" type="button" id="copy-button">
              入力内容をコピー
            </button>

            <button class="button button-danger" type="button" id="clear-button">
              入力を消去
            </button>
          </div>

          <p class="hint">
            この端末に保存しながら、Googleスプレッドシートの「お知らせ」へ送信します。
          </p>
        </form>

        <div class="saved-box">
          <h3>保存した下書き</h3>
          <p>保存した記事はこの端末から再編集できます。</p>
          <div class="saved-list" id="saved-list"></div>
        </div>
      </section>

      <aside class="panel preview-panel">
        <h2>自動シェア画像プレビュー</h2>

        <p class="preview-note">
          共通画像に、入力した種別・テーマ・日付を重ねています。
        </p>

        <div class="share-image-wrap">
          <div class="share-stage" id="share-stage">
            <img src="shiki-dx-article-share-template.jpg" alt="シェア画像の背景">

            <div class="share-overlay">
              <div class="share-type" id="preview-type">
                お知らせ
              </div>

              <div class="share-title" id="preview-title">
                志木のDX電話帳
              </div>

              <div class="share-date" id="preview-date">
                2026年7月13日
              </div>
            </div>
          </div>
        </div>

        <div class="article-preview">
          <div class="meta" id="preview-meta">
            お知らせ｜2026年7月13日
          </div>

          <h3 id="preview-heading">
            志木のDX電話帳
          </h3>

          <p id="preview-body">
            ここに詳細内容が表示されます。
          </p>

          <div class="preview-links" id="preview-links"></div>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    志木のDX電話帳｜管理画面
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "shikiDxAdminDrafts";

    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbzwK-O5QGVloX0h4dqV6bmMCsDeXT116Je8PS4ZVIMRLI2XSE6bc0Fm_5XWFrJZwdXl/exec";

    const ADMIN_KEY = "shiki-dx-admin-2026";

    const fieldIds = [
      "isPublic",
      "type",
      "date",
      "order",
      "title",
      "body",
      "applyName",
      "applyUrl",
      "detailName",
      "detailUrl",
      "youtubeUrl",
      "relatedDxId",
      "startDate",
      "endDate"
    ];

    let editingId = "";

    const $ = id => document.getElementById(id);

    function today(){
      const now = new Date();
      const offset = now.getTimezoneOffset();

      return new Date(
        now.getTime() - offset * 60000
      ).toISOString().slice(0,10);
    }

    function getFormData(){
      const data = {};

      fieldIds.forEach(id => {
        data[id] = $(id).value.trim();
      });

      data.images = [
        ...document.querySelectorAll(".image-url")
      ]
      .map(input => input.value.trim())
      .filter(Boolean);

      data.id =
        editingId ||
        `article-${Date.now()}`;

      data.updatedAt =
        new Date().toISOString();

      return data;
    }

    function setFormData(data){
      editingId = data.id || "";

      fieldIds.forEach(id => {
        if($(id)){
          $(id).value = data[id] || "";
        }
      });

      document
        .querySelectorAll(".image-url")
        .forEach((input,index) => {
          input.value =
            (data.images || [])[index] || "";
        });

      updateImagePreviews();
      updatePreview();
    }

    function getDrafts(){
      try{
        return JSON.parse(
          localStorage.getItem(STORAGE_KEY) || "[]"
        );
      }catch(error){
        return [];
      }
    }

    async function saveDraft(){
      const data = getFormData();

      if(!data.title){
        showToast("テーマを入力してください");
        $("title").focus();
        return;
      }

      const drafts = getDrafts();
      const index = drafts.findIndex(
        item => item.id === data.id
      );

      if(index >= 0){
        drafts[index] = data;
      }else{
        drafts.unshift(data);
      }

      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(drafts.slice(0,30))
      );

      renderDrafts();
      showToast("保存中です");

      try{
        await sendArticleToGas(data);
        showToast("シートへ送信しました");
      }catch(error){
        showToast("端末保存済み・シート送信失敗");
      }
    }

    function sendArticleToGas(data){
      return new Promise((resolve,reject) => {
        if(!GAS_URL){
          reject(new Error("GAS_URLがありません"));
          return;
        }

        const frameName =
          `gas-submit-${Date.now()}`;

        const iframe =
          document.createElement("iframe");

        iframe.name = frameName;
        iframe.style.display = "none";
        document.body.appendChild(iframe);

        const form =
          document.createElement("form");

        form.method = "POST";
        form.action = GAS_URL;
        form.target = frameName;
        form.style.display = "none";

        const payload = {
          action: "saveArticle",
          key: ADMIN_KEY,
          ...data
        };

        const input =
          document.createElement("input");

        input.type = "hidden";
        input.name = "payload";
        input.value = JSON.stringify(payload);

        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();

        setTimeout(() => {
          iframe.remove();
          form.remove();
          resolve();
        },1200);
      });
    }

    function renderDrafts(){
      const wrap = $("saved-list");
      const drafts = getDrafts();

      if(!drafts.length){
        wrap.innerHTML =
          '<p class="hint">まだ保存した下書きはありません。</p>';
        return;
      }

      wrap.innerHTML = drafts.map(item => `
        <div class="saved-item">
          <strong>
            ${escapeHtml(item.title || "無題")}
          </strong>

          <span>
            <button type="button" onclick="loadDraft('${item.id}')">
              開く
            </button>

            <button type="button" onclick="deleteDraft('${item.id}')">
              削除
            </button>
          </span>
        </div>
      `).join("");
    }

    function loadDraft(id){
      const item =
        getDrafts().find(entry => entry.id === id);

      if(!item){
        return;
      }

      setFormData(item);
      showToast("下書きを開きました");
    }

    function deleteDraft(id){
      const drafts =
        getDrafts().filter(item => item.id !== id);

      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(drafts)
      );

      renderDrafts();
      showToast("下書きを削除しました");
    }

    function formatDate(value){
      if(!value){
        return "";
      }

      const parts = value.split("-");

      if(parts.length !== 3){
        return value;
      }

      return `${Number(parts[0])}年${Number(parts[1])}月${Number(parts[2])}日`;
    }

    function updatePreview(){
      const data = getFormData();

      $("preview-type").textContent =
        data.type || "お知らせ";

      $("preview-title").textContent =
        data.title || "志木のDX電話帳";

      $("preview-date").textContent =
        formatDate(data.date) ||
        formatDate(today());

      $("preview-meta").textContent =
        `${data.type || "お知らせ"}｜${
          formatDate(data.date) ||
          formatDate(today())
        }`;

      $("preview-heading").textContent =
        data.title || "志木のDX電話帳";

      $("preview-body").textContent =
        data.body || "ここに詳細内容が表示されます。";

      const links = [];

      if(data.applyUrl){
        links.push(`
          <a href="${escapeAttribute(data.applyUrl)}"
             target="_blank"
             rel="noopener">
             ${escapeHtml(data.applyName || "申し込む")}
          </a>
        `);
      }

      if(data.detailUrl){
        links.push(`
          <a href="${escapeAttribute(data.detailUrl)}"
             target="_blank"
             rel="noopener">
             ${escapeHtml(data.detailName || "詳しく見る")}
          </a>
        `);
      }

      if(data.youtubeUrl){
        links.push(`
          <a href="${escapeAttribute(data.youtubeUrl)}"
             target="_blank"
             rel="noopener">
             YouTubeを見る
          </a>
        `);
      }

      $("preview-links").innerHTML =
        links.join("");
    }

    function updateImagePreviews(){
      document
        .querySelectorAll(".image-url")
        .forEach(input => {
          const preview =
            input.parentElement.querySelector(
              ".image-preview"
            );

          preview.src =
            input.value.trim() ||
            "shiki-dx-phonebook-default-card.jpg";

          preview.onerror = () => {
            preview.src =
              "shiki-dx-phonebook-default-card.jpg";
          };
        });
    }

    function makeShareCanvas(){
      return new Promise((resolve,reject) => {
        const source = new Image();

        source.crossOrigin = "anonymous";

        source.onload = () => {
          const canvas =
            document.createElement("canvas");

          canvas.width = 1200;
          canvas.height = 675;

          const ctx =
            canvas.getContext("2d");

          ctx.drawImage(
            source,
            0,
            0,
            canvas.width,
            canvas.height
          );

          const data = getFormData();
          const x = 62;
          const maxWidth = 555;

          ctx.fillStyle =
            "rgba(255,255,255,.80)";

          ctx.fillRect(
            38,
            46,
            600,
            355
          );

          ctx.fillStyle = "#36a66b";
          ctx.font = "900 28px sans-serif";

          ctx.fillText(
            data.type || "お知らせ",
            x,
            110
          );

          ctx.fillStyle = "#082c6a";

          const title =
            data.title || "志木のDX電話帳";

          const lines =
            wrapCanvasText(
              ctx,
              title,
              maxWidth,
              58
            );

          lines.forEach((line,index) => {
            ctx.fillText(
              line,
              x,
              184 + index * 72
            );
          });

          ctx.fillStyle = "#42617c";
          ctx.font = "800 26px sans-serif";

          ctx.fillText(
            formatDate(data.date) ||
            formatDate(today()),
            x,
            340
          );

          resolve(canvas);
        };

        source.onerror = reject;
        source.src =
          "shiki-dx-article-share-template.jpg";
      });
    }

    function wrapCanvasText(
      ctx,
      text,
      maxWidth,
      fontSize
    ){
      ctx.font =
        `900 ${fontSize}px sans-serif`;

      const result = [];
      let line = "";

      for(const char of text){
        const test = line + char;

        if(
          ctx.measureText(test).width > maxWidth &&
          line
        ){
          result.push(line);
          line = char;
        }else{
          line = test;
        }
      }

      if(line){
        result.push(line);
      }

      return result.slice(0,3);
    }

    async function downloadShareImage(){
      try{
        const canvas =
          await makeShareCanvas();

        const link =
          document.createElement("a");

        link.download =
          "shiki-dx-article-share.png";

        link.href =
          canvas.toDataURL("image/png");

        link.click();

        showToast("シェア画像を作成しました");
      }catch(error){
        showToast("画像を作成できませんでした");
      }
    }

    async function copyData(){
      const data = getFormData();

      try{
        await navigator.clipboard.writeText(
          JSON.stringify(data,null,2)
        );

        showToast("入力内容をコピーしました");
      }catch(error){
        showToast("コピーできませんでした");
      }
    }

    function clearForm(){
      $("article-form").reset();

      editingId = "";

      $("date").value = today();
      $("order").value = "1";

      updateImagePreviews();
      updatePreview();

      showToast("入力を消去しました");
    }

    function showToast(message){
      const toast = $("toast");

      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(showToast.timer);

      showToast.timer =
        setTimeout(() => {
          toast.classList.remove("show");
        },2200);
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttribute(value){
      return escapeHtml(value)
        .replaceAll("`","&#096;");
    }

    $("date").value = today();
    $("startDate").value = today();

    fieldIds.forEach(id => {
      $(id).addEventListener(
        "input",
        updatePreview
      );
    });

    document
      .querySelectorAll(".image-url")
      .forEach(input => {
        input.addEventListener(
          "input",
          updateImagePreviews
        );
      });

    $("save-button").addEventListener(
      "click",
      saveDraft
    );

    $("download-button").addEventListener(
      "click",
      downloadShareImage
    );

    $("copy-button").addEventListener(
      "click",
      copyData
    );

    $("clear-button").addEventListener(
      "click",
      clearForm
    );

    updateImagePreviews();
    updatePreview();
    renderDrafts();
  </script>
</body>
</html>
